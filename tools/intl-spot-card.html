        <article class="spot-card overflow-hidden rounded-2xl border border-slate-100 bg-white shadow-sm ring-1 ring-slate-100">
          <div class="aspect-[16/10] overflow-hidden bg-slate-200">
            <img src="@@SPOT_IMG@@" alt="@@SPOT_TITLE@@" class="h-full w-full object-cover transition duration-300 hover:scale-105" loading="lazy" decoding="async" />
          </div>
          <div class="p-5">
            <h3 class="text-lg font-extrabold text-slate-900">@@SPOT_TITLE@@</h3>
            <p class="mt-2 text-sm leading-relaxed text-slate-600">@@SPOT_DESC@@</p>
          </div>
        </article>
