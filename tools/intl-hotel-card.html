        <article class="card rounded-2xl bg-white p-4 shadow-sm ring-1 ring-slate-100">

            <img src="@@HOTEL_IMG@@" alt="@@HOTEL_NAME@@" class="h-48 w-full rounded-xl object-cover" loading="lazy" decoding="async" />
